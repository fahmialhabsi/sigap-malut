name: Pilot Rollout Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pilot-rollout-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  auth-login-schema-guard:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sigap_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sigap_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Run auth login schema guard (Postgres)
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          DB_DIALECT: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: sigap_ci
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          npx mocha --file tests/setup.js tests/authLogin.integration.test.js --exit

  pilot-rollout-tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Run pilot rollout test suites
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
        run: |
          npx mocha tests/uptdPilotGuard.api.test.js tests/replicationPilotGuard.api.test.js tests/pilotReplicationRoutes.integration.api.test.js --exit
