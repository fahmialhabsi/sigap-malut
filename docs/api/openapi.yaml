          name: komoditas_id
          schema: { type: integer }
        - in: query
          name: wilayah
          schema: { type: string }
      responses:
        '200':
          description: Daftar stok pangan berhasil diambil

  # ════════════════════════════════════════════════
  # WORKFLOW & APPROVAL
  # ════════════════════════════════════════════════
  /approval:
    get:
      tags: [Workflow]
      summary: Daftar pengajuan yang memerlukan persetujuan
      description: Daftar seluruh item yang sedang menunggu persetujuan dari pengguna yang sedang login.
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
          default: pending
        - in: query
          name: module
          schema: { type: string }
          description: Filter berdasarkan kode modul (contoh SEK-KEP, BDS-CPD)
      responses:
        '200':
          description: Daftar pengajuan berhasil diambil
        '401':
          $ref: '#/components/responses/Unauthorized'

  /approval/{id}/approve:
    post:
      tags: [Workflow]
      summary: Setujui pengajuan
      description: Menyetujui pengajuan yang sedang menunggu persetujuan.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          description: Pengajuan berhasil disetujui
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /approval/{id}/reject:
    post:
      tags: [Workflow]
      summary: Tolak pengajuan
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          description: Pengajuan berhasil ditolak
        '403':
          $ref: '#/components/responses/Forbidden'

  /workflow-status:
    get:
      tags: [Workflow]
      summary: Status workflow semua modul
      description: Mendapatkan ringkasan status workflow untuk seluruh modul aktif.
      responses:
        '200':
          description: Status workflow berhasil diambil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/WorkflowStatus'

  # ════════════════════════════════════════════════
  # AUDIT TRAIL
  # ════════════════════════════════════════════════
  /audit-trail:
    get:
      tags: [Audit Trail]
      summary: Riwayat aktivitas pengguna
      description: |
        Mengambil log seluruh aktivitas pengguna dalam sistem.
        Hanya dapat diakses oleh superadmin dan sekretaris.
      parameters:
        - in: query
          name: user_id
          schema: { type: integer }
          description: Filter berdasarkan ID pengguna
        - in: query
          name: action
          schema:
            type: string
            enum: [CREATE, READ, UPDATE, DELETE, LOGIN, LOGOUT, APPROVE, REJECT]
        - in: query
          name: resource
          schema: { type: string }
          description: Filter berdasarkan kode modul
        - in: query
          name: start_date
          schema: { type: string, format: date }
        - in: query
          name: end_date
          schema: { type: string, format: date }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Riwayat aktivitas berhasil diambil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuditLog'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

