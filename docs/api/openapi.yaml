  # ════════════════════════════════════════════════
  # MASTER DATA — KOMODITAS
  # ════════════════════════════════════════════════
  /komoditas:
    get:
      tags: [Dashboard & KPI]
      summary: Daftar Master Data Komoditas Pangan
      description: Master data komoditas pangan yang digunakan sebagai referensi di seluruh modul.
      security: []
      parameters:
        - in: query
          name: is_active
          schema: { type: boolean, default: true }
      responses:
        '200':
          description: Daftar komoditas berhasil diambil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Komoditas'
    post:
      tags: [Dashboard & KPI]
      summary: Tambah komoditas baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kode, nama, satuan]
              properties:
                kode:
                  type: string
                nama:
                  type: string
                satuan:
                  type: string
                kategori:
                  type: string
      responses:
        '201':
          description: Komoditas berhasil ditambahkan

  /stok:
    get:
      tags: [Dashboard & KPI]
      summary: Daftar data Stok Pangan
      description: Monitoring stok pangan di gudang per komoditas dan wilayah.
      parameters:
